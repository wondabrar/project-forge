name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principle of least privilege — CI only needs to read the repo contents.
# Explicit permissions block silences Dependabot security alerts and limits
# blast radius if a workflow step were ever compromised.
permissions:
  contents: read

jobs:
  build-test-lint:
    name: Build / Test / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          BLOB_READ_WRITE_TOKEN: "ci-placeholder-token"
